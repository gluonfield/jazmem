version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/store/sqlite/queries/index"
    schema: "internal/store/sqlite/migrations"
    gen:
      go:
        package: "indexdb"
        out: "internal/store/sqlite/generated/indexdb"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        omit_unused_structs: true
  - engine: "sqlite"
    queries: "internal/store/sqlite/queries/state"
    schema: "internal/store/sqlite/migrations"
    gen:
      go:
        package: "statedb"
        out: "internal/store/sqlite/generated/statedb"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        omit_unused_structs: true
  - engine: "sqlite"
    queries: "internal/store/sqlite/queries/entity"
    schema: "internal/store/sqlite/migrations"
    gen:
      go:
        package: "entitydb"
        out: "internal/store/sqlite/generated/entitydb"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        omit_unused_structs: true
